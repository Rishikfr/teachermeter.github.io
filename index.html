    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px 16px; transition: color .15s; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    .search-wrap { position: relative; }

    .search-wrap .input { padding-left: 36px; }
    .dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; z-index: 20; box-shadow: 0 8px 32px rgba(0,0,0,.5); }

    .bar-chart-row { display: flex; align-items: center; gap: 8px; }
    .bar-bg { flex: 1; height: 14px; background: var(--bg); border-radius: 4px; overflow: hidden; }

    .back-btn:hover { color: #fff; }
    .stat-box { background: var(--bg); border-radius: 12px; padding: 12px; text-align: center; }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .error-box { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 12px; padding: 12px 14px; color: #f87171; font-size: 13px; }
    .warn-box { background: rgba(234,179,8,.1); border: 1px solid rgba(234,179,8,.3); border-radius: 12px; padding: 12px 14px; color: #fbbf24; font-size: 13px; font-weight: 600; }

    .flex { display: flex; }
    .gap2 { gap: 8px; }
    .gap3 { gap: 12px; }
    .wrap { flex-wrap: wrap; }
    .col { flex-direction: column; }
    .items-center { align-items: center; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function getDifficultyColor(v) {
  if (v <= 1.5) return '#22C55E';
  if (v <= 2.5) return '#60A5FA';
  if (v <= 3.5) return '#FBBF24';
  if (v <= 4.5) return '#F87171';
  return '#C084FC';
}
function getDifficultyLabel(v) {
  if (v <= 1.5) return 'Easy';
  if (v <= 2.5) return 'Not Bad';
  if (v <= 3.5) return 'Hard';
  if (v <= 4.5) return 'Send Prayers';
  return 'Drop Out';
}
function computeStats(t) {
  const ratings = t.ratings || [];
  const gradeSubmissions = t.gradeSubmissions || [];
  const avg = ratings.length > 0 ? ratings.reduce((s,r)=>s+r.difficulty,0)/ratings.length : 0;
  const tagCounts = {};
  for (const r of ratings) for (const tag of (r.teacherTags||[])) tagCounts[tag] = (tagCounts[tag]||0)+1;
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([tag,count])=>({tag,count}));
  const gr = ratings.filter(r=>GRADE_VALUES[r.gradeReceived]!==undefined);
  let avgGrade = 'N/A';
  if (gr.length > 0) {
    const gAvg = gr.reduce((s,r)=>s+GRADE_VALUES[r.gradeReceived],0)/gr.length;
    let closest='F', minD=Infinity;
    for (const [g,v] of Object.entries(GRADE_VALUES)) { const d=Math.abs(v-gAvg); if(d<minD){minD=d;closest=g;} }
    avgGrade = closest;
  }
  const recentReviews = ratings.filter(r=>r.reviewText&&r.reviewText.trim()).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  return {...t, averageOverallDifficulty:avg, totalRatingSubmissions:ratings.length, topTeacherTags:topTags, averageGradeReceived:avgGrade, recentReviews};
}
function saveFavorites() {

function uuidv4() {

}

// ═══════════════════════════════════════════════
//  API
// ═══════════════════════════════════════════════
async function fetchTeachers(school) {
  const r = await fetch(`${API_BASE}/api/teachers?school=${encodeURIComponent(school)}`);
  if (!r.ok) throw new Error('Failed to load teachers');
  return r.json();
}
async function fetchTeacher(name) {
  const r = await fetch(`${API_BASE}/api/teachers/${encodeURIComponent(name)}`);
  if (!r.ok) throw new Error('Teacher not found');
  return r.json();
}
async function postRating(body) {
  const r = await fetch(`${API_BASE}/api/ratings`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('Submission failed');
  return r.json();
}

// ═══════════════════════════════════════════════
//  ROUTER / DATA LOADING
// ═══════════════════════════════════════════════
function navigate(page, param) {
  S.page = page;
  S.teacherNameParam = param || '';
  S.error = null;
  if ((page === 'search' || page === 'rate' || page === 'leaderboard') && S.school && S.teachers.length === 0) {
    loadTeachers();
  } else if (page === 'teacher') {
    loadTeacher(param);
  } else {
    render();
  }
}

function loadTeachers() {
  S.loading = true; S.error = null; render();
  fetchTeachers(S.school)
    .then(data => { S.teachers = Array.isArray(data) ? data : []; })
    .catch(e => { S.error = e.message; })
    .finally(() => { S.loading = false; render(); });
}

function loadTeacher(name) {
  S.loading = true; S.currentTeacher = null; S.error = null; render();
  fetchTeacher(name)
    .then(data => { S.currentTeacher = computeStats(data); })
    .catch(e => { S.error = e.message; })
    .finally(() => { S.loading = false; render(); });
}

function refreshTeachers() {
  S.loading = true; render();
  fetchTeachers(S.school)
    .then(data => { S.teachers = Array.isArray(data) ? data : []; })
    .catch(() => {})
    .finally(() => { S.loading = false; render(); });
}

// ═══════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  switch (S.page) {
    case 'home':       app.innerHTML = renderHome(); break;
    case 'search':     app.innerHTML = renderSearch(); break;
    case 'rate':       app.innerHTML = renderRate(); break;
    case 'leaderboard': app.innerHTML = renderLeaderboard(); break;
    case 'teacher':    app.innerHTML = renderTeacher(); break;
    default:           app.innerHTML = renderHome();
  }
  renderNav();
  attachListeners();
}

function renderNav() {
  const nav = document.getElementById('nav');
  const pages = [
    {id:'home', label:'Home', icon:ICON.home},
    {id:'search', label:'Search', icon:ICON.search},
    {id:'rate', label:'Rate', icon:ICON.star},
    {id:'leaderboard', label:'Ranks', icon:ICON.trophy},
  ];
  nav.innerHTML = pages.map(p=>`
    <button class="nav-btn ${S.page===p.id?'active':''}" data-nav="${p.id}">
      ${p.icon}<span>${p.label}</span>
    </button>
  `).join('');
}

// ─── SEARCH ─────────────────────────────────────
function renderSearch() {
  if (!S.school) return renderNoSchool();

  const q = S.searchQuery.toLowerCase().trim();
  let list = q ? S.teachers.filter(t=>t.name.toLowerCase().includes(q)||t.subject.toLowerCase().includes(q)) : S.teachers;
  list = [...list].sort((a,b)=>{
    const fa = S.favorites.has(a._id)?1:0, fb = S.favorites.has(b._id)?1:0;
    if(fa!==fb) return fb-fa;
    return a.name.localeCompare(b.name);
  });

  return `
  <div>
    <div class="sticky-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h1 style="font-size:22px;font-weight:900;">Search Classes</h1>
        <button class="back-btn" id="refresh-btn" style="color:rgba(255,255,255,.5);">${ICON.refresh}</button>
      </div>
      <div class="school-banner">${ICON.school}<span>${S.school}</span></div>
      <div class="search-wrap">
        ${ICON.search}
        <input class="input" id="search-input" type="text" placeholder="Search by name or subject..." value="${escHtml(S.searchQuery)}" />
      </div>
    </div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px;">
      ${S.loading ? `<div class="center-state"><div class="spinner"></div><p style="color:var(--muted);">Loading classes for ${S.school}…</p></div>`
      : S.error ? `<div class="center-state"><p style="color:#f87171;">${S.error}</p></div>`
      : list.length===0 ? `<div class="center-state"><p style="color:var(--muted);font-size:16px;font-weight:600;">${q?'No classes found':'No classes yet'}</p><p style="color:var(--dim);font-size:13px;">${q?'Try a different search':'Be the first to rate a class!'}</p></div>`
      : list.map(t => renderTeacherCard(t)).join('')}
    </div>
  </div>`;
}

function renderTeacherCard(t) {
  const stats = computeStats(t);
  const dc = getDifficultyColor(stats.averageOverallDifficulty);
  const dl = getDifficultyLabel(stats.averageOverallDifficulty);
  const fav = S.favorites.has(t._id);
  return `
  <div class="teacher-card">
    <div class="avatar" style="width:40px;height:40px;font-size:17px;">${escHtml(t.name[0])}</div>
    <div class="flex1">
      <div style="cursor:pointer;" class="teacher-link" data-name="${escHtml(t.name)}">
        <p style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.name)}</p>
        <p style="color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.subject)}</p>
      </div>
      ${stats.totalRatingSubmissions>0?`
      <div style="display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:${dc};background:${dc}22;border:1px solid ${dc}44;">${dl}</span>
        <span style="color:var(--dim);font-size:11px;">${stats.totalRatingSubmissions} review${stats.totalRatingSubmissions!==1?'s':''}</span>
        <span style="color:var(--dim);font-size:11px;">Diff ${stats.averageOverallDifficulty.toFixed(1)}/5</span>
      </div>`:''}
      ${stats.topTeacherTags.length>0?`
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">
        ${stats.topTeacherTags.slice(0,4).map(({tag},i)=>{
          const op = stats.topTeacherTags.length>1?1-(i/(stats.topTeacherTags.length-1))*.6:1;
          return `<span style="font-size:11px;padding:2px 8px;border-radius:999px;color:rgba(42,106,247,${op});background:rgba(42,106,247,${op*.15});border:1px solid rgba(42,106,247,${op*.4});">${escHtml(tag)}</span>`;
        }).join('')}
      </div>`:''}
    </div>
    <button class="fav-btn" data-fav="${escHtml(t._id)}" style="width:22px;height:22px;">
      ${fav?ICON.starFill:ICON.star}
    </button>
  </div>`;
}

// ─── RATE ────────────────────────────────────────
function renderRate() {
  if (!S.school) return renderNoSchool();
  if (S.rateSubmitted) return renderRateSuccess();

  const filteredTeachers = S.teachers.filter(t=>!S.rateTeacherQuery||t.name.toLowerCase().includes(S.rateTeacherQuery.toLowerCase())||t.subject.toLowerCase().includes(S.rateTeacherQuery.toLowerCase()));
  const filteredClasses = S.rateClassQuery.length>=1 ? AVAILABLE_CLASSES.filter(c=>c.toLowerCase().includes(S.rateClassQuery.toLowerCase())).slice(0,8) : [];
  const dc = getDifficultyColor(S.rateDifficulty);
  const dl = getDifficultyLabel(S.rateDifficulty);

  return `
  <div>
    <div class="sticky-header">
      <h1 style="font-size:22px;font-weight:900;">Rate a Class</h1>
      ${S.school?`<p style="color:var(--accent);font-size:13px;font-weight:600;margin-top:2px;">${S.school}</p>`:''}
    </div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:16px;">

      <!-- 1. Teacher -->
      <div class="card">
        <div class="section-label">1. Select Teacher</div>
        ${S.rateSelectedTeacher && !S.rateShowTeacherList ? `
          <div id="rate-change-teacher" style="display:flex;align-items:center;gap:12px;background:rgba(42,106,247,.1);border:1px solid rgba(42,106,247,.4);border-radius:12px;padding:12px 14px;cursor:pointer;">
            <div class="avatar" style="width:36px;height:36px;font-size:15px;">${escHtml(S.rateSelectedTeacher.name[0])}</div>
            <div class="flex1">
              <p style="font-weight:600;font-size:14px;">${escHtml(S.rateSelectedTeacher.name)}</p>
              <p style="color:var(--muted);font-size:12px;">${escHtml(S.rateSelectedTeacher.subject)}</p>
            </div>
            <span style="width:18px;height:18px;">${ICON.edit}</span>
          </div>
        ` : `
          ${S.loading?`<p style="color:var(--muted);font-size:13px;text-align:center;padding:12px;">Loading teachers…</p>`:`
          <input class="input" id="rate-teacher-input" type="text" placeholder="Search teacher by name…" value="${escHtml(S.rateTeacherQuery)}" style="margin-bottom:8px;" />
          <div style="display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;">
            ${filteredTeachers.length===0?`<p style="color:var(--dim);font-size:13px;text-align:center;padding:10px;">No teachers found</p>`:
            filteredTeachers.map(t=>`
              <button class="rate-teacher-pick" data-id="${escHtml(t._id)}" data-name="${escHtml(t.name)}" data-subject="${escHtml(t.subject)}" style="display:flex;align-items:center;gap:10px;background:rgba(26,36,56,.6);border:1px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;text-align:left;">
                <div class="avatar" style="width:32px;height:32px;font-size:13px;background:rgba(42,106,247,.2);color:var(--accent);">${escHtml(t.name[0])}</div>
                <div class="flex1">
                  <p style="font-size:13px;font-weight:600;color:#fff;">${escHtml(t.name)}</p>
                  <p style="font-size:11px;color:var(--dim);">${escHtml(t.subject)}</p>
                </div>
              </button>
            `).join('')}
          </div>`}
        `}
      </div>

      <!-- 2. Class -->
      <div class="card">
        <div class="section-label">2. Select Class</div>
        ${S.rateSelectedClass ? `
          <div id="rate-change-class" style="display:flex;align-items:center;justify-content:space-between;background:rgba(42,106,247,.1);border:1px solid rgba(42,106,247,.4);border-radius:12px;padding:12px 14px;cursor:pointer;">
            <span style="font-size:14px;font-weight:500;">${escHtml(S.rateSelectedClass)}</span>
            <span style="width:18px;height:18px;">${ICON.edit}</span>
          </div>
        ` : `
          <div style="position:relative;">
            <input class="input" id="rate-class-input" type="text" placeholder="Search class name…" value="${escHtml(S.rateClassQuery)}" autocomplete="off" />
            ${S.rateShowClassDropdown && filteredClasses.length>0 ? `
            <div class="dropdown">
              ${filteredClasses.map(c=>`<button class="dropdown-item rate-class-pick" data-class="${escHtml(c)}">${escHtml(c)}</button>`).join('')}
            </div>` : ''}
          </div>
        `}
      </div>

      <!-- Already submitted warning -->
      ${S.rateAlreadySubmitted?`<div class="warn-box">You've already submitted a rating for this teacher &amp; class.</div>`:''}

      <!-- 3. Difficulty -->
      <div class="card">
        <div class="section-label">3. Overall Difficulty</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <span style="font-size:26px;font-weight:900;color:${dc};">${S.rateDifficulty.toFixed(1)}</span>
          <span style="font-size:13px;font-weight:700;padding:4px 12px;border-radius:999px;color:${dc};background:${dc}22;border:1px solid ${dc}44;">${dl}</span>
        </div>
        <input type="range" id="rate-difficulty" min="1" max="5" step="0.5" value="${S.rateDifficulty}" style="accent-color:${dc};" />
        <div style="display:flex;justify-content:space-between;color:var(--dim);font-size:10px;margin-top:4px;">
          <span>Easy</span><span>Not Bad</span><span>Hard</span><span>Send Prayers</span><span>Drop Out</span>
        </div>
      </div>

      <!-- 4. Semester -->
      <div class="card">
        <div class="section-label">4. Semester</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${SEMESTERS.map(s=>`<button class="sem-btn${S.rateSemester===s?' active':''}" data-sem="${s}">${s}</button>`).join('')}
        </div>
        ${S.rateSemester==='Full Year'?`
        <div style="margin-top:12px;">
          <p style="color:var(--muted);font-size:12px;margin-bottom:8px;">Which semester was harder?</p>

        </div>`:''}

      <!-- 5. Grade -->
      <div class="card">
        <div class="section-label">5. Grade Received</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${GRADES.map(g=>`<button class="grade-btn${S.rateGradeReceived===g?' active':''}" data-grade="${g}">${g}</button>`).join('')}
        </div>
        <div style="margin-top:12px;">

// ─── LEADERBOARD ─────────────────────────────────
function renderLeaderboard() {
  if (!S.school) return renderNoSchool();

  const withRatings = S.teachers.map(t=>computeStats(t)).filter(t=>t.totalRatingSubmissions>0);
  let sorted;
  switch(S.sortMode) {
    case 'mostReviewed':  sorted=[...withRatings].sort((a,b)=>b.totalRatingSubmissions-a.totalRatingSubmissions); break;
    case 'leastReviewed': sorted=[...withRatings].sort((a,b)=>a.totalRatingSubmissions-b.totalRatingSubmissions); break;
    case 'mostDifficult': sorted=[...withRatings].sort((a,b)=>b.averageOverallDifficulty-a.averageOverallDifficulty); break;
    case 'leastDifficult':sorted=[...withRatings].sort((a,b)=>a.averageOverallDifficulty-b.averageOverallDifficulty); break;
    default: sorted=withRatings;
  }

  const getCardBorder = (i,total) => {
    if(S.sortMode!=='mostDifficult'&&S.sortMode!=='leastDifficult') return 'var(--border)';
    if(total<=0) return LEVEL_COLORS[0];
    const li = total===1?0:Math.round((i*4)/(total-1));
    const cl = Math.min(4,Math.max(0,li));
    return S.sortMode==='mostDifficult'?LEVEL_COLORS[cl]:LEVEL_COLORS[4-cl];
  };

  return `
  <div>
    <div class="sticky-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h1 style="font-size:22px;font-weight:900;">Leaderboard</h1>
        <button class="back-btn" id="lb-refresh" style="color:rgba(255,255,255,.5);">${ICON.refresh}</button>
      </div>
      ${S.school?`<div class="school-banner">${ICON.school}<span>${S.school}</span></div>`:''}
    </div>
    <div style="padding:16px 20px;">
      ${S.loading ? `<div class="center-state"><div class="spinner"></div><p style="color:var(--muted);">Loading leaderboard…</p></div>`
      : sorted.length===0 ? `<div class="center-state"><p style="color:var(--muted);font-size:16px;font-weight:600;">No ratings yet</p><p style="color:var(--dim);font-size:13px;">Be the first to rate a class!</p><button class="btn-accent" data-nav="rate" style="margin-top:16px;width:auto;padding:10px 24px;">Rate a Class</button></div>`
      : `
        <button id="lb-sort" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;margin-bottom:16px;">
          <span style="font-weight:700;font-size:18px;color:#fff;">${SORT_LABELS[S.sortMode]}</span>
          <span style="width:20px;height:20px;color:rgba(255,255,255,.4);">${ICON.sort}</span>
          <span style="color:var(--dim);font-size:11px;">Tap to change</span>
        </button>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${sorted.map((t,i)=>{
            const bc = getCardBorder(i,sorted.length);
            const dc = getDifficultyColor(t.averageOverallDifficulty);
            return `
            <div class="teacher-link" data-name="${escHtml(t.name)}" style="background:var(--card);border:1.5px solid ${bc};border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;">
              <div style="width:28px;text-align:center;flex-shrink:0;"><span style="color:var(--dim);font-weight:700;font-size:13px;">#${i+1}</span></div>
              <div class="avatar" style="width:40px;height:40px;font-size:17px;">${escHtml(t.name[0])}</div>
              <div class="flex1" style="min-width:0;">
                <p style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.name)}</p>
                <p style="color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.subject)}</p>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <p style="font-weight:700;font-size:13px;color:${dc};">${t.averageOverallDifficulty.toFixed(1)}/5</p>
                <p style="color:var(--dim);font-size:11px;">${t.totalRatingSubmissions} review${t.totalRatingSubmissions!==1?'s':''}</p>
              </div>
            </div>`;
          }).join('')}
        </div>
      `}
    </div>
  </div>`;
}

// ─── TEACHER DETAIL ──────────────────────────────
function renderTeacher() {
  if (S.loading) return `<div class="center-state" style="min-height:80vh;"><div class="spinner"></div><p style="color:var(--muted);">Loading…</p></div>`;
  if (S.error||!S.currentTeacher) return `<div class="center-state" style="min-height:80vh;"><p style="color:#f87171;">${S.error||'Teacher not found'}</p><button class="btn-accent" id="td-back" style="margin-top:16px;width:auto;padding:10px 24px;">Go Back</button></div>`;

  const t = S.currentTeacher;
  const dc = getDifficultyColor(t.averageOverallDifficulty);
  const dl = getDifficultyLabel(t.averageOverallDifficulty);
  const weekendRate = t.ratings.length>0 ? ((t.ratings.filter(r=>r.hasWeekendHomework).length/t.ratings.length)*100).toFixed(0) : null;
  const avgHrs = t.ratings.length>0 ? (t.ratings.reduce((s,r)=>s+r.weeklyAfterSchoolHours,0)/t.ratings.length).toFixed(1) : null;

  const gradeCounts = {};
  for (const r of t.ratings) gradeCounts[r.gradeReceived]=(gradeCounts[r.gradeReceived]||0)+1;
  const maxGC = Math.max(1,...Object.values(gradeCounts));

  return `
  <div>
    <div class="sticky-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="back-btn" id="td-back">${ICON.back}</button>
        <h1 style="font-size:17px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(t.name)}</h1>
      </div>
    </div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:14px;">

      <!-- Hero -->
      <div class="card">
        <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:${t.totalRatingSubmissions>0?'16px':'0'};">
          <div class="avatar" style="width:54px;height:54px;font-size:22px;font-weight:900;">${escHtml(t.name[0])}</div>
          <div class="flex1" style="min-width:0;">
            <h2 style="font-size:19px;font-weight:900;">${escHtml(t.name)}</h2>
            <p style="color:var(--muted);font-size:13px;">${escHtml(t.subject)}</p>
            <p style="color:var(--dim);font-size:11px;margin-top:2px;">${escHtml(t.school)}</p>
          </div>
        </div>
        ${t.totalRatingSubmissions>0?`
        <div class="grid3">
          <div class="stat-box"><p style="color:var(--dim);font-size:10px;margin-bottom:4px;">Difficulty</p><p style="font-size:18px;font-weight:900;color:${dc};">${t.averageOverallDifficulty.toFixed(1)}/5</p><p style="color:var(--dim);font-size:10px;margin-top:2px;">${dl}</p></div>
          <div class="stat-box"><p style="color:var(--dim);font-size:10px;margin-bottom:4px;">Reviews</p><p style="font-size:18px;font-weight:900;color:#60A5FA;">${t.totalRatingSubmissions}</p><p style="color:var(--dim);font-size:10px;margin-top:2px;">total</p></div>
          <div class="stat-box"><p style="color:var(--dim);font-size:10px;margin-bottom:4px;">Avg Grade</p><p style="font-size:18px;font-weight:900;color:#FBBF24;">${t.averageGradeReceived}</p><p style="color:var(--dim);font-size:10px;margin-top:2px;">received</p></div>
        </div>`:''}
      </div>

      <!-- Top Tags -->
      ${t.topTeacherTags.length>0?`
      <div class="card">
        <div class="section-label">Top Tags</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${t.topTeacherTags.map(({tag,count},i)=>{
            const total=t.topTeacherTags.length;
            const op=total>1?1-(i/(total-1))*.6:1;
            return `<div style="display:flex;align-items:center;gap:6px;"><span style="font-size:13px;padding:4px 12px;border-radius:999px;border:1px solid rgba(42,106,247,${op*.4});background:rgba(42,106,247,${op*.15});color:rgba(42,106,247,${op});font-weight:500;">${escHtml(tag)}</span><span style="color:var(--dim);font-size:11px;">${count}</span></div>`;
          }).join('')}
        </div>
      </div>`:''}

      <!-- Workload -->
      ${t.totalRatingSubmissions>0&&(avgHrs!==null||weekendRate!==null)?`
      <div class="card">
        <div class="section-label">Workload</div>
        <div class="grid2">
          ${avgHrs!==null?`<div class="stat-box"><p style="color:var(--accent);font-size:22px;font-weight:900;">${avgHrs}h</p><p style="color:var(--dim);font-size:11px;margin-top:4px;">Avg weekly hrs</p></div>`:''}
          ${weekendRate!==null?`<div class="stat-box"><p style="color:#FB923C;font-size:22px;font-weight:900;">${weekendRate}%</p><p style="color:var(--dim);font-size:11px;margin-top:4px;">Weekend homework</p></div>`:''}
        </div>
      </div>`:''}

      <!-- Grade Distribution -->
      ${Object.keys(gradeCounts).length>0?`
      <div class="card">
        <div class="section-label">Grade Distribution</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${GRADE_ORDER.filter(g=>gradeCounts[g]).map(g=>{
            const count=gradeCounts[g]||0;
            const pct=(count/maxGC)*100;
            const bc=g.startsWith('A')?'#22C55E':g.startsWith('B')?'#60A5FA':g.startsWith('C')?'#FBBF24':'#F87171';
            return `<div class="bar-chart-row"><span style="color:var(--muted);font-size:11px;width:22px;text-align:right;font-family:monospace;">${g}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${bc};"></div></div><span style="color:var(--dim);font-size:11px;width:16px;">${count}</span></div>`;
          }).join('')}
        </div>
      </div>`:''}

      <!-- Recent Reviews -->
      ${t.recentReviews.length>0?`
      <div class="card">
        <div class="section-label">Recent Reviews</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${t.recentReviews.slice(0,5).map(r=>`
          <div class="review-card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
              <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:${getDifficultyColor(r.difficulty)};background:${getDifficultyColor(r.difficulty)}22;">${getDifficultyLabel(r.difficulty)}</span>
              <span style="color:var(--dim);font-size:11px;">${escHtml(r.className||r.subject)}</span>
              <span style="color:var(--dim);font-size:11px;margin-left:auto;">${new Date(r.timestamp).toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>
            </div>
            <p style="color:rgba(255,255,255,.7);font-size:13px;line-height:1.5;">${escHtml(r.reviewText)}</p>
            ${r.teacherTags&&r.teacherTags.length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${r.teacherTags.slice(0,3).map(tag=>`<span style="color:rgba(42,106,247,.6);font-size:11px;border:1px solid rgba(42,106,247,.2);padding:1px 8px;border-radius:999px;">${escHtml(tag)}</span>`).join('')}</div>`:''}
          </div>`).join('')}
        </div>
      </div>`:''}

      <button class="btn-accent" data-nav="rate">Rate This Teacher</button>
      <div style="height:8px;"></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  ESCAPE UTILITY
// ═══════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════
function attachListeners() {
  // Nav buttons
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => {
      const page = btn.dataset.nav;
      if (page==='search'||page==='rate'||page==='leaderboard') {
        if (S.school && S.teachers.length===0) loadTeachers();
      }
      S.page = page; render();
    });
  });

  // Nav buttons in nav bar
  document.querySelectorAll('[data-nav-main]').forEach(btn => {
    btn.addEventListener('click', () => { S.page = btn.dataset.navMain; render(); });
  });

  // School picker
  document.querySelectorAll('.school-pick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const school = btn.dataset.school;
      S.school = school;
      S.teachers = [];
      localStorage.setItem('ryp_school', school);
      S.page = 'search';
      loadTeachers();
    });
  });

  // Teacher card links
  document.querySelectorAll('.teacher-link').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.name;
      S.page = 'teacher';
      S.teacherNameParam = name;
      loadTeacher(name);
    });
  });

  // Favorite buttons
  document.querySelectorAll('[data-fav]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); toggleFavorite(btn.dataset.fav); });
  });

  // Search input
  const si = document.getElementById('search-input');
  if (si) { si.addEventListener('input', e => { S.searchQuery = e.target.value; render(); }); si.focus(); }

  // Refresh buttons
  const rb = document.getElementById('refresh-btn');
  if (rb) rb.addEventListener('click', refreshTeachers);
  const lb = document.getElementById('lb-refresh');
  if (lb) lb.addEventListener('click', refreshTeachers);

  // Leaderboard sort
  const lbs = document.getElementById('lb-sort');
  if (lbs) lbs.addEventListener('click', () => {
    const idx = SORT_ORDER_ARR.indexOf(S.sortMode);
    S.sortMode = SORT_ORDER_ARR[(idx+1)%SORT_ORDER_ARR.length];
    render();
  });

  // Back buttons
  document.querySelectorAll('#td-back').forEach(btn => btn.addEventListener('click', () => { history.back ? history.go(-1) : (S.page='search',render()); if(S.page==='teacher'){S.page='search';render();} }));

  // Rate form
  const rti = document.getElementById('rate-teacher-input');
  if (rti) {
    rti.addEventListener('input', e => { S.rateTeacherQuery = e.target.value; render(); });
    rti.focus();
  }

  document.querySelectorAll('.rate-teacher-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      S.rateSelectedTeacher = {_id:btn.dataset.id, name:btn.dataset.name, subject:btn.dataset.subject};
      S.rateShowTeacherList = false;
      checkAlreadySubmitted();
      render();
    });
  });

  const rct = document.getElementById('rate-change-teacher');
  if (rct) rct.addEventListener('click', () => { S.rateShowTeacherList=true; render(); });

  const rci2 = document.getElementById('rate-class-input');
  if (rci2) {
    rci2.addEventListener('input', e => { S.rateClassQuery=e.target.value; S.rateShowClassDropdown=true; render(); });
    rci2.addEventListener('focus', () => { S.rateShowClassDropdown=true; render(); });
  }

  document.querySelectorAll('.rate-class-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      S.rateSelectedClass = btn.dataset.class;
      S.rateClassQuery = btn.dataset.class;
      S.rateShowClassDropdown = false;
      checkAlreadySubmitted();
      render();
    });
  });

  const rcc = document.getElementById('rate-change-class');
  if (rcc) rcc.addEventListener('click', () => { S.rateSelectedClass=null; S.rateClassQuery=''; render(); });

  const rdiff = document.getElementById('rate-difficulty');
  if (rdiff) rdiff.addEventListener('input', e => { S.rateDifficulty=Number(e.target.value); render(); });

  document.querySelectorAll('[data-sem]').forEach(btn => {
    btn.addEventListener('click', () => { S.rateSemester=btn.dataset.sem; S.rateHarderSemester=null; render(); });
  });

  document.querySelectorAll('[data-harder]').forEach(btn => {
    btn.addEventListener('click', () => { S.rateHarderSemester=btn.dataset.harder; render(); });
  });

  document.querySelectorAll('[data-grade]').forEach(btn => {
    btn.addEventListener('click', () => { S.rateGradeReceived=btn.dataset.grade; render(); });
  });

  const rgpa = document.getElementById('rate-gpa');
  if (rgpa) rgpa.addEventListener('input', e => { S.rateGpa=e.target.value; });

  document.querySelectorAll('[data-tag]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      if (S.rateTags.includes(tag)) S.rateTags=S.rateTags.filter(t=>t!==tag); else S.rateTags=[...S.rateTags,tag];
      render();
    });
  });

  const rwh = document.getElementById('rate-weekly-hours');
  if (rwh) rwh.addEventListener('input', e => { S.rateWeeklyHours=Number(e.target.value); render(); });

  const rwt = document.getElementById('rate-weekend-toggle');
  if (rwt) rwt.addEventListener('click', () => { S.rateWeekendHomework=!S.rateWeekendHomework; render(); });

  const rrev = document.getElementById('rate-review');
  if (rrev) rrev.addEventListener('input', e => { S.rateReviewText=e.target.value; render(); });

  const rsub = document.getElementById('rate-submit');
  if (rsub) rsub.addEventListener('click', async () => {
    if (!S.rateSelectedTeacher||!S.rateSelectedClass||S.rateSubmitting||S.rateAlreadySubmitted) return;
    S.rateSubmitting=true; S.rateError=null; render();
    try {
      await postRating({
        teacherName: S.rateSelectedTeacher.name,
        teacherSubject: S.rateSelectedTeacher.subject,
        school: S.school,
        className: S.rateSelectedClass,
        difficulty: S.rateDifficulty,
        semester: S.rateSemester,
        harderSemester: S.rateSemester==='Full Year'?S.rateHarderSemester:null,
        gradeReceived: S.rateGradeReceived,
        gpa: S.rateGpa?Number(S.rateGpa):null,
        teacherTags: S.rateTags,
        reviewText: S.rateReviewText.trim()||null,
        weeklyAfterSchoolHours: S.rateWeeklyHours,
        hasWeekendHomework: S.rateWeekendHomework,
      });
      const key=`submitted_rating_v2_${S.rateSelectedTeacher.name}_${S.rateSelectedClass}`;
      localStorage.setItem(key,'1');
      S.rateSubmitted=true;
      S.teachers=[];
    } catch(e) { S.rateError='Something went wrong. Please try again.'; }
    S.rateSubmitting=false; render();
  });

  const ra = document.getElementById('rate-another');
  if (ra) ra.addEventListener('click', () => {
    S.rateSubmitted=false; S.rateSelectedTeacher=null; S.rateSelectedClass=null;
    S.rateTeacherQuery=''; S.rateClassQuery=''; S.rateShowTeacherList=true;
    S.rateDifficulty=3; S.rateSemester='First Semester'; S.rateHarderSemester=null;
    S.rateGradeReceived='A'; S.rateGpa=''; S.rateTags=[]; S.rateReviewText='';
    S.rateWeeklyHours=0; S.rateWeekendHomework=false; S.rateError=null; S.rateAlreadySubmitted=false;
    render();
  });
}
